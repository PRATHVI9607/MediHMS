# ============================================================
#  MediVault HMS — Production-parity stack (MySQL + Adminer)
#  Dev mode uses zero-config SQLite; this is the MySQL path.
# ============================================================
services:
  mysql:
    image: mysql:8.4
    container_name: medivault-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: medivault_root
      MYSQL_DATABASE: medivault_hms
      MYSQL_USER: medivault
      MYSQL_PASSWORD: medivault_pass
    ports:
      - "3306:3306"
    volumes:
      - medivault_db:/var/lib/mysql
      - ./apps/server/src/db/schema.mysql.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pmedivault_root"]
      interval: 10s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    container_name: medivault-adminer
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
      ADMINER_DESIGN: flat

volumes:
  medivault_db:
